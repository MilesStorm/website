[application]

# Web `build` & `serve` dist path
out_dir = "dist"

# resource (static) file folder
asset_dir = "public"

default_platform = "web"

[web.wasm_opt]
# The level wasm-opt should target. z is the smallest. 4 is the fastest.
level = "4"

[web.app]

# HTML title tag content
title = "MilesStorm"

[web.watcher]

watch_path = ["src", "examples"]

reload_html = true

[web.resource]

[web.resource.dev]

# Javascript code file
# serve: [dev-server] only
script = []

[bundle]
# Bundle identifier
identifier = "io.github.milesstorm"

# Bundle publisher
publisher = "milesstorm"

# Bundle icon
icon = ["icons/icon.png"]

# Bundle resources
resources = ["public/*"]

# Bundle copyright
copyright = ""

# Bundle category
category = "Utility"

# Bundle short description
short_description = "An amazing dioxus application."

# Bundle long description
long_description = """
An amazing dioxus application.
"""
