[package]
name = "api"
version = "0.2.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
ui = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
ulid = { workspace = true }
reqwest = { workspace = true }
jsonwebtoken = { workspace = true }

http = "1"
