[package]
name = "web"
version = "0.2.2"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
ui = { workspace = true }
api = { workspace = true }
manganis = { version = "0.7.7", features = ["dioxus"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dotenvy = { workspace = true }
tower-sessions = { workspace = true }
tower-sessions-redis-store = { workspace = true }
axum = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Distributed tracing (OTLP → Alloy → Tempo)
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.27", features = ["grpc-tonic"] }
tracing-opentelemetry = "0.28"
axum-tracing-opentelemetry = "0.25"

# Metrics (Prometheus exposition format → Alloy → Mimir)
axum-prometheus = "0.10"
tokio = { version = "1", features = ["rt-multi-thread"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }
getrandom02 = { package = "getrandom", version = "0.2", features = ["js"] }

[features]
web = ["dioxus/web"]
server = ["dioxus/server", "ui/server", "api/server"]
