[package]
name = "web"
version = "0.2.2"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
ui = { workspace = true }
api = { workspace = true }
manganis = { version = "0.7.7", features = ["dioxus"] }
serde = { workspace = true }
serde_json = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dotenvy = { workspace = true }
tower-sessions = { workspace = true }
tower-sessions-redis-store = { workspace = true }
axum = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Distributed tracing (OTLP → Alloy → Tempo) + log bridge (OTLP → Alloy → Loki)
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio", "logs"] }
opentelemetry-otlp = { version = "0.27", features = ["grpc-tonic", "logs"] }
opentelemetry-appender-tracing = "0.27"
tracing-opentelemetry = "0.28"
# `tracing_level_info` raises OtelAxumLayer's per-request span from TRACE to INFO so it
# survives the `info` EnvFilter (RUST_LOG=info). Without it the span is never recorded, so
# no OTel SpanContext exists to capture/propagate — breaking cross-service trace linkage.
axum-tracing-opentelemetry = { version = "0.25", features = ["tracing_level_info"] }

# Metrics (Prometheus exposition format → Alloy → Mimir)
axum-prometheus = "0.10"
tokio = { version = "1", features = ["rt-multi-thread"] }
tokio-tungstenite = "0.29"
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }
getrandom02 = { package = "getrandom", version = "0.2", features = ["js"] }
web-sys = { version = "0.3", features = [
    "Window",
    "Location",
    "Navigator",
    "MediaDevices",
    "MediaStream",
    "MediaStreamConstraints",
    "HtmlVideoElement",
    "HtmlMediaElement",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    "WebSocket",
    "MessageEvent",
    "BinaryType",
] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
rand = "0.9"
gloo-timers = { version = "0.3", features = ["futures"] }

[features]
web = ["dioxus/web"]
server = ["dioxus/server", "ui/server", "api/server"]
