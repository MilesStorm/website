apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: frontend-virtual-service
  namespace: istio-system
spec:
  hosts:
  - milesstorm.com
  gateways:
  - public-gateway
  http:
  - match:
    - uri:
        prefix: /auth/login/google/init
    - uri:
        prefix: /auth/login/google/callback
    - uri:
        prefix: /auth/login/github/init
    - uri:
        prefix: /auth/login/github/callback
    route:
    - destination:
        host: auth-service.auth.svc.cluster.local
        port:
          number: 80
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: frontend-service.frontend.svc.cluster.local
        port:
          number: 80
