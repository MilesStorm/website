apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: auth-virtual-service
  namespace: istio-system
spec:
  hosts:
  - milesstorm.com
  gateways:
  - public-gateway
  http:
  # Only OAuth init + callback paths are publicly reachable. Every other
  # /auth/* route exists for legacy/internal reasons and must not be
  # exposed via the public gateway. /internal/* is intentionally absent —
  # it is reachable only in-cluster via auth-service.auth.svc.cluster.local.
  - match:
    - uri:
        prefix: /auth/login/google/init
    - uri:
        prefix: /auth/login/google/callback
    - uri:
        prefix: /auth/login/github/init
    - uri:
        prefix: /auth/login/github/callback
    route:
    - destination:
        host: auth-service.auth.svc.cluster.local
        port:
          number: 80
