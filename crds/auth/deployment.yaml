apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: auth
  name: auth-deployment
  labels:
    istio-injection: enabled
    app: auth
spec:
  replicas: 2  # Number of replicas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
        monitoring.milesstorm.com/scrape: "true"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: auth
      containers:
      - name: auth
        image: ghcr.io/milesstorm/auth:latest
        ports:
        - containerPort: 7070
          name: http
        env:
          - name: DATABASE_URL
            valueFrom: 
              secretKeyRef: 
                name: website-secrets
                key: uri
          - name: CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: website-secrets
                key: CLIENT_ID
          - name: CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: website-secrets
                key: CLIENT_SECRET
          - name: G_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: website-secrets
                key: G_CLIENT_ID
          - name: G_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: website-secrets
                key: G_CLIENT_SECRET
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: website-secrets
                key: JWT_SECRET
          - name: BFF_SERVICE_SECRET
            valueFrom:
              secretKeyRef:
                name: website-secrets
                key: BFF_SERVICE_SECRET
          - name: BFF_CALLBACK_URL
            value: "https://milesstorm.com"
          - name: SERVER_IP
            value: "0.0.0.0"
          - name: RUST_LOG
            value: "info"
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://alloy.monitoring.svc.cluster.local:4317"
      imagePullSecrets:
        - name: dockerconfigjson-github-com
